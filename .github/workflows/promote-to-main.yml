name: Promote to Main

# ─────────────────────────────────────────────────────────────────────
# Triggered when int-agentic receives a merge (push).
# Creates or updates a single rolling PR from int-agentic → main.
# The PR accumulates all developer changes and requires human review
# before merging to production.
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - int-agentic
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or update PR to main
        env:
          # Prefer GH_PAT (allows PR-trigger semantics on downstream workflows).
          # Falls back to GITHUB_TOKEN if GH_PAT is unset or invalid; in that
          # case the PR is still created/updated, but `pull_request` workflows
          # will not auto-trigger on the synthetic PR (GitHub's anti-recursion
          # rule). Production CI runs on push-to-main after merge regardless.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip when int-agentic == main (nothing to promote, branches in sync).
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD)
          if [ "$COMMITS_AHEAD" = "0" ]; then
            echo "✅ int-agentic is in sync with main (0 commits ahead) — nothing to promote."
            exit 0
          fi
          echo "ℹ️  int-agentic is ${COMMITS_AHEAD} commit(s) ahead of main."

          # Probe the token; on auth failure, fall back to GITHUB_TOKEN.
          if ! gh auth status >/dev/null 2>&1; then
            echo "⚠️  Primary GH_TOKEN failed auth (GH_PAT likely expired). Falling back to GITHUB_TOKEN."
            echo "   Update the GH_PAT secret in repo settings to restore PR-trigger semantics."
            export GH_TOKEN="$FALLBACK_TOKEN"
          fi

          # Check if there's already an open PR from int-agentic → main
          EXISTING_PR=$(gh pr list \
            --base main \
            --head int-agentic \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "✅ PR #${EXISTING_PR} already exists (int-agentic → main)"
            echo "   Updating PR body with latest commit info..."

            # Get recent commits since the PR was created
            RECENT_COMMITS=$(git log origin/main..HEAD --oneline --no-merges | head -20)

            gh pr edit "$EXISTING_PR" --body "## Promotion: int-agentic → main

          This is an auto-maintained PR that promotes changes from \`int-agentic\` to \`main\` (production).

          **Review required** before merging to production.

          ### Recent Changes
          \`\`\`
          ${RECENT_COMMITS}
          \`\`\`

          ### Pipeline Status
          - Integration tests passed on each developer's environment before merge to int-agentic
          - Merging this PR will trigger a full production deployment

          ---
          _Last updated: $(date -u '+%Y-%m-%d %H:%M UTC') by commit ${{ github.sha }}_"

            echo "✅ PR #${EXISTING_PR} body updated"
          else
            echo "📝 Creating new PR: int-agentic → main"

            RECENT_COMMITS=$(git log origin/main..HEAD --oneline --no-merges | head -20)

            gh pr create \
              --base main \
              --head int-agentic \
              --title "Promote: int-agentic → main (production)" \
              --body "## Promotion: int-agentic → main

          This is an auto-maintained PR that promotes changes from \`int-agentic\` to \`main\` (production).

          **Review required** before merging to production.

          ### Recent Changes
          \`\`\`
          ${RECENT_COMMITS}
          \`\`\`

          ### Pipeline Status
          - Integration tests passed on each developer's environment before merge to int-agentic
          - Merging this PR will trigger a full production deployment

          ---
          _Created: $(date -u '+%Y-%m-%d %H:%M UTC') by commit ${{ github.sha }}_"

            echo "✅ New PR created"
          fi
